pr: 139777
releasenote:
  text: |-
    Changed `kubeadm` to explicitly set `KubeProxyConfiguration.mode` to iptables when `KubeProxyConfiguration` is not provided or when the `mode` field is empty. In `v1.37`, `kube-proxy` will warn if the field is not explicitly set as part of the planned transition to nftables as the default mode in a future release.
  sigs:
  - cluster-lifecycle
  kinds:
  - cleanup
  - deprecation
  areas:
  - kubeadm
